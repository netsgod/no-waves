name: Publish Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download release assets
        run: |
          curl -fL "https://nowaves.ru/latest.yml" -o latest.yml
          curl -fL "https://nowaves.ru/no-waves-setup.exe" -o "no-waves-Setup-${VERSION}.exe"
          curl -fL "https://nowaves.ru/no-waves-setup.exe.blockmap" -o "no-waves-Setup-${VERSION}.exe.blockmap"

      - name: Validate latest.yml version
        run: |
          grep -q "^version: ${VERSION}$" latest.yml

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.VERSION }}
          generate_release_notes: false
          body: |
            no waves ${{ env.VERSION }}

            - актуальный Windows-клиент
            - свежий installer для сайта и автообновлений
            - release-ассеты синхронизированы с серверной сборкой
          files: |
            latest.yml
            no-waves-Setup-${{ env.VERSION }}.exe
            no-waves-Setup-${{ env.VERSION }}.exe.blockmap
